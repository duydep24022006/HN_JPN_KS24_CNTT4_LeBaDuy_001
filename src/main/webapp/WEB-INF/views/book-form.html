<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <title th:text="${bookId != null} ? 'Cập nhật sách' : 'Thêm sách'">Form</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body class="container mt-4">

<h2 th:text="${bookId != null} ? 'Cập nhật sách' : 'Thêm sách'" style="display: flex "></h2>

<!-- Action tự động đổi giữa save và update -->
<form th:action="${bookId != null} ? @{'/update/' + ${bookId}} : @{/save}"
      th:object="${bookDto}"
      method="post"
      enctype="multipart/form-data">

    <div class="form-group" style="${bookId != null} ? display: none: display">
        <label>Id:</label>
        <input type="number" th:field="*{id}" class="form-control" placeholder="Nhập id..."/>
        <p th:if="${#fields.hasErrors('id')}" th:errors="*{id}" style="color:red"></p>
    </div>

    <div class="form-group">
        <label>Title</label>
        <input type="text" th:field="*{title}" class="form-control" placeholder="Nhập title"/>
        <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}" style="color:red"></p>
    </div>

    <div class="form-group">
        <label>Author:</label>
        <input type="text" th:field="*{author}" class="form-control" placeholder="Nhập author"/>
        <p th:if="${#fields.hasErrors('author')}" th:errors="*{author}" style="color:red"></p>
    </div>
    <div class="form-group">
        <label>Quantity:</label>
        <input type="number" th:field="*{quantity}" class="form-control" placeholder="Nhập quantity"/>
        <p th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}" style="color:red"></p>
    </div>
    <div class="form-group">
        <label>Image:</label>

        <!-- Hiển thị ảnh hiện tại nếu đang edit -->
        <div th:if="${currentImage != null}" class="mb-2">
            <img th:src="@{'/images/' + ${currentImage}}" width="80" height="80"
                 style="object-fit:cover; border:1px solid #ddd; border-radius:4px;"/>
            <p class="text-muted small">Chọn ảnh mới để thay thế, hoặc bỏ qua để giữ ảnh cũ</p>
        </div>

        <input type="file" name="coverImage" class="form-control-file "/>
        <p th:if="${#fields.hasErrors('coverImage')}" th:errors="*{coverImage}" style="color:red"></p>
    </div>

    <button type="submit" class="btn btn-primary ">Submit</button>
    <a th:href="@{/}" class="btn btn-secondary ml-2">Hủy</a>
</form>

<script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" crossorigin="anonymous"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js" crossorigin="anonymous"></script>
<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js" crossorigin="anonymous"></script>
</body>
</html>
